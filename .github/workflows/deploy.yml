name: Deploy to Production

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Setup SSH Connection
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Remote Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.131.188.94 >> ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 644 ~/.ssh/known_hosts

      - name: Check Deployer Exists
        run: |
          ls -la vendor/bin
          php vendor/bin/dep --version

      - name: Test Raw SSH Login
        run: |
          ssh -vvv -o StrictHostKeyChecking=yes github-actions-deploy@34.131.188.94 "whoami && hostname && pwd"

      - name: Run Deployer
        run: php vendor/bin/dep deploy production -vvv